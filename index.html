<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>國二加強回覆</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  font-family: Arial,"Microsoft JhengHei";
  padding:15px;
  background:#f5f5f5;
}

.notice{
  width:100%;
  border:1px solid #ddd;
  margin-bottom:20px;
}

.card{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

label{
  display:block;
  margin:8px 0;
}

input[type=text]{
  width:100%;
  padding:10px;
  font-size:18px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#06c755;
  color:white;
}

#status{
  margin-top:10px;
  color:#666;
}
</style>
</head>

<body>

<h2>國二 6/27 加強課回覆</h2>

<img src="schedule.png" class="notice">

<div class="card">
<h3>學生姓名</h3>
<input type="text" id="student" placeholder="請輸入學生姓名">
</div>

<div class="card">
<h3>6/27（六）09:00～10:30 社會加強</h3>
<label><input type="radio" name="social" value="參加">我願意參加</label>
<label><input type="radio" name="social" value="不參加">我不參加</label>
</div>

<div class="card">
<h3>6/27（六）10:30～12:00 理化加強</h3>
<label><input type="radio" name="science" value="參加">我願意參加</label>
<label><input type="radio" name="science" value="不參加">我不參加</label>
</div>

<button onclick="sendForm()">送出回覆</button>

<div id="status">LIFF初始化中...</div>

<script>
const LIFF_ID = "2010485669-4ZPXDW17";
const API_URL = "你的AppsScript網址";

let currentUserId = "未知";

window.onload = async function(){
  try{
    await liff.init({ liffId: LIFF_ID });

    if (liff.isLoggedIn()) {
      const profile = await liff.getProfile();
      currentUserId = profile.userId;
    }

    document.getElementById("status").innerHTML = "LIFF初始化成功";

  }catch(err){
    document.getElementById("status").innerHTML =
      "LIFF錯誤：" + err.message;
  }
};

function getValue(name){
  const checked = document.querySelector('input[name="' + name + '"]:checked');
  return checked ? checked.value : "";
}

function sendForm() {
  const student = document.getElementById("student").value.trim();
  const social = getValue("social");
  const science = getValue("science");

  if (!student || !social || !science) {
    alert("請全部填寫完成後再送出");
    return;
  }

  const url =
    API_URL +
    "?action=save" +
    "&userId=" + encodeURIComponent(currentUserId) +
    "&student=" + encodeURIComponent(student) +
    "&social=" + encodeURIComponent(social) +
    "&science=" + encodeURIComponent(science);

  window.open(url, "_blank");

  alert("已送出／更新回覆");
}
</script>

</body>
</html>
