<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>第三次段考週通知單</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
  font-family: Arial,"Microsoft JhengHei";
  padding:15px;
  background:#f5f5f5;
}

.notice{
  width:100%;
  border:1px solid #ddd;
  margin-bottom:20px;
}

.card{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

label{
  display:block;
  margin:8px 0;
}

button{
  width:100%;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#06c755;
  color:white;
}

#status{
  margin-top:10px;
  color:#666;
}

</style>

</head>
<body>

<h2>第三次段考週通知單</h2>

<img src="schedule.png" class="notice">

<div class="card">

<h3>6/24（三）英文加強</h3>

<label>
<input type="radio" name="eng" value="參加">
我願意參加
</label>

<label>
<input type="radio" name="eng" value="不參加">
我不參加
</label>

<h3>6/24（三）訂餐</h3>

<label>
<input type="radio" name="engMeal" value="訂餐">
訂餐
</label>

<label>
<input type="radio" name="engMeal" value="不訂餐">
不訂餐
</label>

</div>

<div class="card">

<h3>6/25（四）生物加強</h3>

<label>
<input type="radio" name="bio" value="參加">
我願意參加
</label>

<label>
<input type="radio" name="bio" value="不參加">
我不參加
</label>

<h3>6/25（四）社會講座</h3>

<label>
<input type="radio" name="social" value="參加">
我願意參加
</label>

<label>
<input type="radio" name="social" value="不參加">
我不參加
</label>

<h3>6/25（四）訂餐</h3>

<label>
<input type="radio" name="bioMeal" value="訂餐">
訂餐
</label>

<label>
<input type="radio" name="bioMeal" value="不訂餐">
不訂餐
</label>

</div>

<button onclick="sendForm()">
送出回覆
</button>

<div id="status">
LIFF初始化中...
</div>

<script>

const LIFF_ID = "2010485669-4ZPXDW17";

window.onload = async function(){

  try{

    await liff.init({
      liffId: LIFF_ID
    });

    document.getElementById("status").innerHTML =
      "LIFF初始化成功";

  }catch(err){

    document.getElementById("status").innerHTML =
      "LIFF錯誤：" + err.message;

  }

};

function getValue(name){

  const checked =
    document.querySelector(
      'input[name="' + name + '"]:checked'
    );

  return checked ? checked.value : "";

}

async function sendForm() {

  const eng = getValue("eng");
  const engMeal = getValue("engMeal");
  const bio = getValue("bio");
  const social = getValue("social");
  const bioMeal = getValue("bioMeal");

  if (!eng || !engMeal || !bio || !social || !bioMeal) {

    alert("請全部勾選完成後再送出");
    return;

  }

  try {

    let userId = "未知";

    if (liff.isLoggedIn()) {

      const profile =
        await liff.getProfile();

      userId = profile.userId;

    }

    const response = await fetch(
      "https://script.google.com/macros/s/AKfycbxyE-fQP4EE7BpYTCihYQEgnm6j-LSqpiUxgH-POJWybhGKmqDcuZGpcjM9aKiA1INJMQ/exec",
      {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
          userId: userId,
          eng: eng,
          engMeal: engMeal,
          bio: bio,
          social: social,
          bioMeal: bioMeal
        })
      }
    );

    const text = await response.text();

    alert("伺服器回覆：" + text);

  } catch (err) {

    alert(
      "送出失敗\n\n" +
      "名稱：" + err.name +
      "\n\n訊息：" + err.message
    );

  }

}

</script>

</body>
</html>
